<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ยืนยันอีเมล airaMD</title>
</head>
<body style="margin:0;padding:0;background:#F7F0E8;font-family:'Helvetica Neue',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#F7F0E8;padding:40px 0;">
    <tr>
      <td align="center">
        <table width="440" cellpadding="0" cellspacing="0" border="0" style="max-width:440px;width:100%;background:#ffffff;border-radius:20px;border:1px solid rgba(200,178,160,0.3);box-shadow:0 4px 24px rgba(90,63,44,0.06);">
          <!-- Logo -->
          <tr>
            <td align="center" style="padding:40px 32px 0;">
              <div style="width:64px;height:64px;border-radius:20px;background:linear-gradient(135deg,#5A3F2C,#7A5840,#A8806A);display:inline-block;line-height:64px;text-align:center;">
                <span style="font-family:Georgia,'Times New Roman',serif;font-size:20px;font-weight:bold;color:#ffffff;letter-spacing:1px;">aira</span>
              </div>
            </td>
          </tr>
          <!-- Brand -->
          <tr>
            <td align="center" style="padding:16px 32px 0;">
              <h1 style="margin:0;font-family:Georgia,'Times New Roman',serif;font-size:26px;font-weight:700;color:#2E2E2E;letter-spacing:1px;">airaMD</h1>
            </td>
          </tr>
          <!-- Divider -->
          <tr>
            <td style="padding:20px 40px;">
              <hr style="border:none;border-top:1px solid rgba(200,178,160,0.3);margin:0;">
            </td>
          </tr>
          <!-- Content -->
          <tr>
            <td style="padding:0 40px;">
              <h2 style="margin:0 0 8px;font-family:'Helvetica Neue',Arial,sans-serif;font-size:20px;font-weight:700;color:#2E2E2E;">ยืนยันอีเมลของคุณ</h2>
              <p style="margin:0 0 24px;font-size:15px;color:#8C7B6B;line-height:1.6;">
                ขอบคุณที่สมัครใช้งาน airaMD<br>
                กรุณากดปุ่มด้านล่างเพื่อยืนยันบัญชีของคุณ
              </p>
            </td>
          </tr>
          <!-- CTA Button -->
          <tr>
            <td align="center" style="padding:0 40px 28px;">
              <a href="{{ .ConfirmationURL }}"
                 style="display:inline-block;padding:14px 40px;background:linear-gradient(135deg,#5A3F2C,#7A5840);color:#ffffff;font-size:15px;font-weight:600;border-radius:14px;text-decoration:none;box-shadow:0 4px 12px rgba(90,63,44,0.25);">
                ยืนยันอีเมล
              </a>
            </td>
          </tr>
          <!-- Note -->
          <tr>
            <td style="padding:0 40px 32px;">
              <p style="margin:0;font-size:12px;color:#BBA998;line-height:1.5;">
                หากคุณไม่ได้สมัครบัญชีนี้ สามารถเพิกเฉยอีเมลนี้ได้<br>
                ลิงก์จะหมดอายุใน 24 ชั่วโมง
              </p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td align="center" style="padding:20px 32px;border-top:1px solid rgba(200,178,160,0.2);background:rgba(247,240,232,0.5);border-radius:0 0 20px 20px;">
              <p style="margin:0;font-size:11px;color:rgba(140,123,107,0.6);">
                Powered by airaMD — Aesthetic Clinic Management
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
