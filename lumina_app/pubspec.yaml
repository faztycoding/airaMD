name: airamd
description: "airaMD — Clinic Management App for Aesthetic Clinics"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Backend
  supabase_flutter: ^2.8.0

  # Navigation
  go_router: ^14.8.1

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1

  # Drawing / Canvas
  perfect_freehand: 2.5.2+1

  # Signature
  signature: ^5.5.0

  # Photo
  image_picker: ^1.1.2
  image_cropper: ^9.0.0
  flutter_image_compress: ^2.3.0
  photo_view: ^0.15.0

  # Calendar
  table_calendar: ^3.1.3

  # Auth / Security
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.4

  # Notifications
  firebase_messaging: ^15.2.4
  firebase_core: ^3.13.0
  flutter_local_notifications: ^18.0.1

  # Offline
  connectivity_plus: ^6.1.4

  # PDF
  pdf: ^3.11.1
  printing: ^5.13.3

  # Timezone (for scheduled notifications)
  timezone: ^0.9.4

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  path_provider: ^2.1.5
  share_plus: ^10.0.0
  url_launcher: ^6.3.1
  permission_handler: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/face_diagrams/
    - assets/icons/
    - assets/diagrams/
